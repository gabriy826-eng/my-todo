<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清爽清单 (Clarity Focus) - AI 增强版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
                Trash2: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
                CheckCircle2: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m9 12 2 2 4-4"></path></svg>,
                Circle: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle></svg>,
                ListTodo: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="5" width="6" height="6" rx="1"></rect><path d="m3 17 2 2 4-4"></path><path d="M13 6h8"></path><path d="M13 12h8"></path><path d="M13 18h8"></path></svg>,
                AlertCircle: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
                Sparkles: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>,
                Sun: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>,
                Moon: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>,
                Wand2: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m2 22 1-1"></path><path d="M20.2 2.02l2.58 2.58a3.5 3.5 0 0 1 0 4.95L12.95 19.3a3.5 3.5 0 0 1-4.95 0L5.42 16.7a3.5 3.5 0 0 1 0-4.95L15.25 2.02a3.5 3.5 0 0 1 4.95 0Z"></path><path d="m6.2 13.8 3.1 3.1"></path><path d="m10.1 9.9 3.1 3.1"></path></svg>,
                BrainCircuit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 8.105V19a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-2.143l-1.257-2.514L12 5Z"></path><path d="M9 13a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"></path><path d="M15 13a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"></path></svg>,
                Loader2: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`}><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>,
                Tag: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"></path><path d="M7 7h.01"></path></svg>,
                BarChart3: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path></svg>,
                Settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [todos, setTodos] = useState(() => {
                const saved = localStorage.getItem('clarity_todos_ai_web');
                return saved ? JSON.parse(saved) : [];
            });
            const [inputValue, setInputValue] = useState('');
            const [priority, setPriority] = useState('medium');
            const [category, setCategory] = useState('个人');
            const [filter, setFilter] = useState('all');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [aiQuote, setAiQuote] = useState('');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('clarity_gemini_api_key') || '');

            useEffect(() => {
                localStorage.setItem('clarity_todos_ai_web', JSON.stringify(todos));
            }, [todos]);

            useEffect(() => {
                if (apiKey) generateDailyMotivation();
            }, [apiKey]);

            const categories = ['工作', '个人', '购物', '健康', '学习'];
            const priorities = [
                { id: 'high', label: '高优先级', color: 'text-red-500', bg: 'bg-red-50' },
                { id: 'medium', label: '中优先级', color: 'text-orange-500', bg: 'bg-orange-50' },
                { id: 'low', label: '低优先级', color: 'text-blue-500', bg: 'bg-blue-50' }
            ];

            const callGemini = async (prompt, systemPrompt = "") => {
                if (!apiKey) {
                    setIsSettingsOpen(true);
                    throw new Error('Missing API Key');
                }
                let delay = 1000;
                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        });
                        if (!response.ok) throw new Error('API Error');
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (err) {
                        if (i === 4) throw err;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                    }
                }
            };

            const generateDailyMotivation = async () => {
                try {
                    const quote = await callGemini(
                        "根据我现在有多个任务待办的情况，给我一句简短的中文鼓励话语，要幽默且充满动力。",
                        "你是一个高效办公助手，说话简短有力。"
                    );
                    setAiQuote(quote);
                } catch (e) {
                    setAiQuote("今天也是充满希望的一天！");
                }
            };

            const handleAISmartBreakdown = async () => {
                if (!inputValue.trim()) return;
                setIsGenerating(true);
                try {
                    const result = await callGemini(
                        `将这个任务拆解成4-5个具体的子任务，只返回JSON数组格式，如 ["子任务1", "子任务2"]。任务内容：${inputValue}`,
                        "你是一个任务拆解专家。只返回合法的JSON字符串数组。"
                    );
                    const subtasks = JSON.parse(result);
                    const newTodos = subtasks.map((text, index) => ({
                        id: Date.now() + index,
                        text,
                        completed: false,
                        priority: 'medium',
                        category,
                        createdAt: new Date().toISOString()
                    }));
                    setTodos([...newTodos, ...todos]);
                    setInputValue('');
                } catch (e) {
                    console.error("AI breakdown failed", e);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleAIRefine = async () => {
                if (!inputValue.trim()) return;
                setIsGenerating(true);
                try {
                    const refinedText = await callGemini(
                        `润色这个待办事项，让它更明确、专业。只返回润色后的文字。内容：${inputValue}`,
                        "你是一个文字精炼专家。"
                    );
                    setInputValue(refinedText.trim());
                } catch (e) {
                    console.error("AI refinement failed", e);
                } finally {
                    setIsGenerating(false);
                }
            };

            const saveApiKey = (newKey) => {
                setApiKey(newKey);
                localStorage.setItem('clarity_gemini_api_key', newKey);
                setIsSettingsOpen(false);
            };

            const addTodo = (e) => {
                e?.preventDefault();
                if (!inputValue.trim()) return;
                const newTodo = { id: Date.now(), text: inputValue, completed: false, priority, category, createdAt: new Date().toISOString() };
                setTodos([newTodo, ...todos]);
                setInputValue('');
            };

            const toggleTodo = (id) => setTodos(todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            const deleteTodo = (id) => setTodos(todos.filter(t => t.id !== id));

            const filteredTodos = useMemo(() => {
                let result = todos;
                if (filter === 'active') result = todos.filter(t => !t.completed);
                if (filter === 'completed') result = todos.filter(t => t.completed);
                return [...result].sort((a, b) => {
                    if (a.completed !== b.completed) return a.completed ? 1 : -1;
                    const weight = { high: 0, medium: 1, low: 2 };
                    return weight[a.priority] - weight[b.priority];
                });
            }, [todos, filter]);

            const stats = { total: todos.length, completed: todos.filter(t => t.completed).length, pending: todos.filter(t => !t.completed).length };

            return (
                <div className={`min-h-screen transition-colors duration-300 ${isDarkMode ? 'bg-slate-900 text-slate-100' : 'bg-slate-50 text-slate-800'}`}>
                    <div className="max-w-3xl mx-auto px-4 py-12">
                        <header className="flex justify-between items-start mb-10">
                            <div>
                                <h1 className="text-3xl font-bold flex items-center gap-2">
                                    <Icon name="ListTodo" size={32} className="text-indigo-500" />
                                    清爽清单 <span className="text-xs bg-indigo-500 text-white px-2 py-1 rounded-full font-normal">AI Powered</span>
                                </h1>
                                {aiQuote && <p className="text-indigo-400 mt-2 italic text-sm flex items-center gap-2"><Icon name="Sparkles" size={14} /> {aiQuote}</p>}
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setIsSettingsOpen(true)} className={`p-2 rounded-full ${isDarkMode ? 'bg-slate-800 text-slate-400' : 'bg-white text-slate-400 shadow-sm'}`}><Icon name="Settings" size={20} /></button>
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className={`p-2 rounded-full ${isDarkMode ? 'bg-slate-800 text-yellow-400' : 'bg-white text-slate-600 shadow-sm'}`}>{isDarkMode ? <Icon name="Sun" size={20} /> : <Icon name="Moon" size={20} />}</button>
                            </div>
                        </header>

                        <div className="grid grid-cols-3 gap-4 mb-8">
                            {[{ label: '全部', value: stats.total, icon: 'BarChart3' }, { label: '进行中', value: stats.pending, icon: 'AlertCircle' }, { label: '已完成', value: stats.completed, icon: 'CheckCircle2' }].map((item) => (
                                <div key={item.label} className={`p-4 rounded-2xl border ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100 shadow-sm'}`}>
                                    <div className="flex items-center justify-between text-slate-400 mb-1"><span className="text-xs font-medium uppercase tracking-wider">{item.label}</span><Icon name={item.icon} size={16} /></div>
                                    <div className="text-2xl font-bold">{item.value}</div>
                                </div>
                            ))}
                        </div>

                        <div className={`p-6 rounded-2xl mb-8 border ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100 shadow-lg'}`}>
                            <div className="flex gap-4 mb-4">
                                <input type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="输入你的目标或任务..." disabled={isGenerating} className={`flex-1 bg-transparent border-b-2 py-2 px-1 outline-none transition-colors ${isDarkMode ? 'border-slate-700 focus:border-indigo-500' : 'border-slate-100 focus:border-indigo-500'}`} />
                                <button onClick={addTodo} disabled={isGenerating} className="bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-xl transition-all hover:scale-105 active:scale-95 shadow-md shadow-indigo-200">{isGenerating ? <Icon name="Loader2" size={24} /> : <Icon name="Plus" size={24} />}</button>
                            </div>
                            <div className="flex flex-wrap gap-3 items-center">
                                <div className="flex items-center gap-2 mr-4"><Icon name="AlertCircle" size={16} className="text-slate-400" /><select value={priority} onChange={(e) => setPriority(e.target.value)} className="bg-transparent text-sm outline-none cursor-pointer font-medium">{priorities.map(p => <option key={p.id} value={p.id} className={isDarkMode ? 'bg-slate-800' : ''}>{p.label}</option>)}</select></div>
                                <div className="flex items-center gap-2 mr-auto"><Icon name="Tag" size={16} className="text-slate-400" /><select value={category} onChange={(e) => setCategory(e.target.value)} className="bg-transparent text-sm outline-none cursor-pointer font-medium">{categories.map(c => <option key={c} value={c} className={isDarkMode ? 'bg-slate-800' : ''}>{c}</option>)}</select></div>
                                <div className="flex gap-2">
                                    <button onClick={handleAIRefine} disabled={!inputValue || isGenerating} className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold bg-amber-50 text-amber-600 hover:bg-amber-100 transition-colors disabled:opacity-50"><Icon name="Wand2" size={14} /> ✨ 智能润色</button>
                                    <button onClick={handleAISmartBreakdown} disabled={!inputValue || isGenerating} className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold bg-purple-50 text-purple-600 hover:bg-purple-100 transition-colors disabled:opacity-50"><Icon name="BrainCircuit" size={14} /> ✨ 目标拆解</button>
                                </div>
                            </div>
                        </div>

                        <div className="flex gap-2 mb-6 overflow-x-auto pb-2 no-scrollbar">
                            {['all', 'active', 'completed'].map((f) => (
                                <button key={f} onClick={() => setFilter(f)} className={`px-4 py-2 rounded-full text-sm font-medium transition-all whitespace-nowrap ${filter === f ? 'bg-indigo-600 text-white' : `${isDarkMode ? 'bg-slate-800 text-slate-400' : 'bg-white text-slate-500'} border border-transparent`}`}>{f === 'all' ? '全部' : f === 'active' ? '进行中' : '已归档'}</button>
                            ))}
                        </div>

                        <div className="space-y-3">
                            {filteredTodos.length === 0 ? (
                                <div className="text-center py-20 text-slate-400"><Icon name="ListTodo" size={48} className="mx-auto mb-4 opacity-20" /><p>暂无任务，试试用 AI 拆解一个大目标？</p></div>
                            ) : (
                                filteredTodos.map((todo) => (
                                    <div key={todo.id} className={`group flex items-center gap-4 p-4 rounded-2xl border transition-all ${todo.completed ? 'opacity-50' : 'hover:shadow-md'} ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100'}`}>
                                        <button onClick={() => toggleTodo(todo.id)} className={`transition-colors ${todo.completed ? 'text-green-500' : 'text-slate-300'}`}>{todo.completed ? <Icon name="CheckCircle2" size={24} /> : <Icon name="Circle" size={24} />}</button>
                                        <div className="flex-1 min-w-0"><h3 className={`font-medium truncate ${todo.completed ? 'line-through' : ''}`}>{todo.text}</h3><div className="flex gap-3 mt-1 items-center"><span className={`text-[10px] px-2 py-0.5 rounded-full font-bold uppercase ${priorities.find(p => p.id === todo.priority).bg} ${priorities.find(p => p.id === todo.priority).color}`}>{priorities.find(p => p.id === todo.priority).label}</span><span className="text-[10px] text-slate-400 flex items-center gap-1"><Icon name="Tag" size={10} /> {todo.category}</span></div></div>
                                        <button onClick={() => deleteTodo(todo.id)} className="p-2 text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="Trash2" size={18} /></button>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {/* API Key Modal */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
                            <div className={`w-full max-w-md p-6 rounded-3xl shadow-2xl ${isDarkMode ? 'bg-slate-800' : 'bg-white'}`}>
                                <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon name="BrainCircuit" className="text-indigo-500" /> AI 服务设置</h2>
                                <p className="text-sm text-slate-400 mb-6 text-wrap">请输入你的 Gemini API Key 以激活智能拆解和润色功能。Key 将仅保存在你的本地浏览器中。</p>
                                <input 
                                    type="password" 
                                    defaultValue={apiKey}
                                    placeholder="输入你的 API Key..." 
                                    onKeyDown={(e) => { if(e.key === 'Enter') saveApiKey(e.target.value); }}
                                    className={`w-full p-3 rounded-xl border mb-6 outline-none focus:ring-2 focus:ring-indigo-500 transition-all ${isDarkMode ? 'bg-slate-700 border-slate-600 text-white' : 'bg-slate-50 border-slate-200'}`} 
                                />
                                <div className="flex gap-3">
                                    <button onClick={() => setIsSettingsOpen(false)} className={`flex-1 py-3 rounded-xl font-medium ${isDarkMode ? 'bg-slate-700 text-slate-300' : 'bg-slate-100 text-slate-600'}`}>取消</button>
                                    <button onClick={(e) => saveApiKey(e.target.previousSibling.value)} className="flex-1 py-3 rounded-xl font-medium bg-indigo-600 text-white shadow-lg shadow-indigo-200">保存设置</button>
                                </div>
                                <p className="mt-4 text-[10px] text-center text-slate-500">没有 Key？前往 <a href="https://aistudio.google.com/" target="_blank" className="text-indigo-500 underline">Google AI Studio</a> 免费申请</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
